<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lens" x1="30%" y1="30%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <rect x="70" y="110" width="372" height="260" rx="60" fill="url(#body)" stroke="#e94560" stroke-width="4"/>
  <rect x="130" y="85" width="100" height="36" rx="18" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
  <circle cx="256" cy="240" r="85" fill="url(#lens)" stroke="#e94560" stroke-width="4"/>
  <circle cx="256" cy="240" r="55" fill="#1a1a2e" stroke="#533483" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="240" r="30" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <circle cx="256" cy="240" r="10" fill="#e94560" opacity="0.8">
    <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="170" r="10" fill="#e94560" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#e94560" letter-spacing="4">JCamera</text>
</svg>
