<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a4e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="64" y="120" width="384" height="256" rx="48" fill="url(#body)" stroke="#3a2a6e" stroke-width="6"/>
  <rect x="140" y="88" width="100" height="42" rx="21" fill="#0f0f1f" stroke="#e94560" stroke-width="5"/>
  <circle cx="256" cy="248" r="96" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <circle cx="256" cy="248" r="76" fill="none" stroke="#533483" stroke-width="4"/>
  <circle cx="256" cy="248" r="56" fill="url(#ring)" opacity="0.15"/>
  <circle cx="256" cy="248" r="16" fill="#e94560">
    <animate attributeName="r" values="16;19;16" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="248" r="16" fill="#ff6b81" opacity="0.3">
    <animate attributeName="r" values="16;28;16" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
